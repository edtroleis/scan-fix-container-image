name: Scan and Publish Container Image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "Source registry"
        required: true
        type: choice
        options:
          - docker.io
          - quay.io
      image_name:
        description: "Image name (e.g. library/ubuntu or username/myapp)"
        required: true
        type: string
      tag:
        description: "Image tag"
        required: true
        default: "latest"
        type: string
      severity:
        description: "Minimum CVE severity that breaks the pipeline"
        required: true
        type: choice
        default: "HIGH,CRITICAL"
        options:
          - CRITICAL
          - HIGH,CRITICAL
          - MEDIUM,HIGH,CRITICAL

jobs:

  # ----------------------------------------------------------------------------
  # Job 1: Scan original image
  # Fails when CVEs are found (trivy --exit-code 1). Downstream jobs route on
  # needs.scan.result: 'failure' = CVEs found, 'success' = image is clean.
  # ----------------------------------------------------------------------------
  scan:
    name: CVE Scan
    runs-on: ubuntu-latest
    env:
      SOURCE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: podman pull "$SOURCE_IMAGE"

      - name: Scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ env.SOURCE_IMAGE }}
          tar_path: /tmp/source-image.tar
          artifact_name: trivy-results
          severity: ${{ inputs.severity }}

  # ----------------------------------------------------------------------------
  # Job 2: Publish original image (scan passed — no CVEs found)
  # ----------------------------------------------------------------------------
  publish_original:
    name: Publish to Registry (Original)
    runs-on: ubuntu-latest
    needs: scan
    if: needs.scan.result == 'success'

    steps:
      - name: Pull image
        run: podman pull "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Login to registry
        run: |
          # podman login localhost:8083 \
          #   --username "${{ secrets.NEXUS_USER }}" \
          #   --password-stdin \
          #   --tls-verify=false
          echo "Simulated login: localhost:8083"

      - name: Tag image for registry
        run: |
          podman tag \
            "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}" \
            "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Push to registry
        run: |
          # podman push --tls-verify=false "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"
          echo "Simulated push: localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Job summary
        run: |
          {
            echo "## Published successfully"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}\` |"
            echo "| **Registry** | \`localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}\` |"
            echo "| **Severity gate** | \`${{ inputs.severity }}\` |"
            echo "| **Patched** | No — original image passed the scan |"
            echo ""
            echo "### Pull from registry"
            echo '```'
            echo "podman pull --tls-verify=false localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ----------------------------------------------------------------------------
  # Job 3: Patch image (scan found CVEs)
  # Detects the container OS via /etc/os-release, generates a Dockerfile
  # with FROM <source_image> + OS package update, and builds a patched image.
  # ----------------------------------------------------------------------------
  patch:
    name: Patch Image (OS & Language pkg Update)
    runs-on: ubuntu-latest
    needs: scan
    if: always() && needs.scan.result == 'failure'
    env:
      SOURCE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}
      PATCHED_IMAGE: ${{ inputs.image_name }}:${{ inputs.tag }}-patched

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: podman pull "$SOURCE_IMAGE"

      - name: Build patched image
        run: bash patch-image.sh "$SOURCE_IMAGE" "$PATCHED_IMAGE"

      - name: Save patched image
        run: podman save "$PATCHED_IMAGE" -o /tmp/patched-image.tar

      - name: Upload patched image artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-image
          path: /tmp/patched-image.tar
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Job 4: Rescan the patched image
  # Same severity gate as the original scan.
  # Fails if CVEs remain after the OS update.
  # ----------------------------------------------------------------------------
  rescan:
    name: CVE Rescan (Patched)
    runs-on: ubuntu-latest
    needs: patch
    if: always() && needs.patch.result == 'success'
    env:
      PATCHED_IMAGE: ${{ inputs.image_name }}:${{ inputs.tag }}-patched

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download patched image artifact
        uses: actions/download-artifact@v4
        with:
          name: patched-image
          path: /tmp/

      - name: Scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ env.PATCHED_IMAGE }}
          tar_path: /tmp/patched-image.tar
          artifact_name: trivy-results-patched
          severity: ${{ inputs.severity }}
          skip_save: 'true'
          baseline_artifact: trivy-results-json

  # ----------------------------------------------------------------------------
  # Job 5: Publish patched image (rescan passed — CVEs fixed)
  # ----------------------------------------------------------------------------
  publish_patched:
    name: Publish to Registry (Patched)
    runs-on: ubuntu-latest
    needs: rescan
    if: always() && needs.rescan.result == 'success'

    steps:
      - name: Download patched image artifact
        uses: actions/download-artifact@v4
        with:
          name: patched-image
          path: /tmp/

      - name: Load patched image
        run: podman load -i /tmp/patched-image.tar

      - name: Login to registry
        run: |
          # podman login localhost:8083 \
          #   --username "${{ secrets.NEXUS_USER }}" \
          #   --password-stdin \
          #   --tls-verify=false
          echo "Simulated login: localhost:8083"

      - name: Tag image for registry
        run: |
          podman tag \
            "${{ inputs.image_name }}:${{ inputs.tag }}-patched" \
            "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"

      - name: Push to registry
        run: |
          # podman push --tls-verify=false "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"
          echo "Simulated push: localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"

      - name: Job summary
        run: |
          {
            echo "## Published successfully (Patched)"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ inputs.image_name }}:${{ inputs.tag }}-patched\` |"
            echo "| **Registry** | \`localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched\` |"
            echo "| **Severity gate** | \`${{ inputs.severity }}\` |"
            echo "| **Patched** | Yes — original image had CVEs, rescan passed after patching |"
            echo ""
            echo "### Pull from registry"
            echo '```'
            echo "podman pull --tls-verify=false localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
