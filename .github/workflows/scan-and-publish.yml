name: Scan and Publish Container Image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "Source registry"
        required: true
        type: choice
        options:
          - docker.io
          - quay.io
      image_name:
        description: "Image name (e.g. library/ubuntu or username/myapp)"
        required: true
        type: string
      tag:
        description: "Image tag"
        required: true
        default: "latest"
        type: string
      severity:
        description: "Minimum CVE severity that breaks the pipeline"
        required: true
        type: choice
        default: "HIGH,CRITICAL"
        options:
          - CRITICAL
          - HIGH,CRITICAL
          - MEDIUM,HIGH,CRITICAL

jobs:

  # ----------------------------------------------------------------------------
  # Job 1: Scan original image
  # Fails if CVEs at or above the configured severity are found.
  # ----------------------------------------------------------------------------
  scan:
    name: CVE Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SOURCE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: podman pull "$SOURCE_IMAGE"

      - name: Scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ env.SOURCE_IMAGE }}
          tar_path: /tmp/source-image.tar
          artifact_name: trivy-results
          severity: ${{ inputs.severity }}

  # ----------------------------------------------------------------------------
  # Job 2: Patch image (only when scan fails due to CVEs)
  # Detects the container OS via /etc/os-release, generates a Dockerfile
  # with FROM <source_image> + OS package update, and builds a patched image.
  # ----------------------------------------------------------------------------
  patch:
    name: Patch Image (OS & Language pkg Update)
    runs-on: ubuntu-latest
    needs: scan
    if: always() && needs.scan.result == 'failure'
    env:
      SOURCE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}
      PATCHED_IMAGE: ${{ inputs.image_name }}:${{ inputs.tag }}-patched

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: podman pull "$SOURCE_IMAGE"

      - name: Build patched image
        run: bash patch-image.sh "$SOURCE_IMAGE" "$PATCHED_IMAGE"

      - name: Save patched image
        run: podman save "$PATCHED_IMAGE" -o /tmp/patched-image.tar

      - name: Upload patched image artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-image
          path: /tmp/patched-image.tar
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Job 3: Rescan the patched image
  # Same severity gate as the original scan.
  # Fails if CVEs remain after the OS update.
  # ----------------------------------------------------------------------------
  rescan:
    name: CVE Rescan (Patched)
    runs-on: ubuntu-latest
    needs: [scan, patch]
    if: always() && needs.patch.result == 'success'
    env:
      PATCHED_IMAGE: ${{ inputs.image_name }}:${{ inputs.tag }}-patched

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download patched image artifact
        uses: actions/download-artifact@v4
        with:
          name: patched-image
          path: /tmp/

      - name: Scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ env.PATCHED_IMAGE }}
          tar_path: /tmp/patched-image.tar
          artifact_name: trivy-results-patched
          severity: ${{ inputs.severity }}
          skip_save: 'true'
          baseline_artifact: trivy-results-json

  # ----------------------------------------------------------------------------
  # Job 4: Publish to registry
  # Runs when either the original scan passed or the patched rescan passed.
  # Resolves which image to push at runtime: original tag when scan passed,
  # <tag>-patched when rescan passed.
  # NOTE: podman push is commented out — registry is simulated (localhost:8083).
  # ----------------------------------------------------------------------------
  publish:
    name: Publish to Registry
    runs-on: ubuntu-latest
    needs: [scan, rescan]
    if: always() && (needs.scan.result == 'success' || needs.rescan.result == 'success')

    steps:
      - name: Resolve image to publish
        id: vars
        run: |
          if [ "${{ needs.scan.result }}" = "success" ]; then
            echo "source=${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "nexus_target=localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "source=${{ inputs.image_name }}:${{ inputs.tag }}-patched" >> "$GITHUB_OUTPUT"
            echo "nexus_target=localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull source image
        if: needs.scan.result == 'success'
        run: podman pull "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Download patched image artifact
        if: needs.rescan.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: patched-image
          path: /tmp/

      - name: Load patched image
        if: needs.rescan.result == 'success'
        run: podman load -i /tmp/patched-image.tar

      - name: Login to registry
        run: |
          # podman login localhost:8083 \
          #   --username "${{ secrets.NEXUS_USER }}" \
          #   --password-stdin \
          #   --tls-verify=false
          echo "Simulated login: localhost:8083"

      - name: Tag image for registry
        run: podman tag "${{ steps.vars.outputs.source }}" "${{ steps.vars.outputs.nexus_target }}"

      - name: Push to registry
        run: |
          # podman push --tls-verify=false "${{ steps.vars.outputs.nexus_target }}"
          echo "Simulated push: ${{ steps.vars.outputs.nexus_target }}"

      - name: Job summary
        run: |
          echo "## Published successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Source** | \`${{ steps.vars.outputs.source }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ steps.vars.outputs.nexus_target }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Severity gate** | \`${{ inputs.severity }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull from registry" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "podman pull --tls-verify=false ${{ steps.vars.outputs.nexus_target }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
