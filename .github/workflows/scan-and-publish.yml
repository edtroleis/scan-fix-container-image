name: Scan and Publish Container Image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "Source registry"
        required: true
        type: choice
        options:
          - docker.io
          - quay.io
      image_name:
        description: "Image name (e.g. library/ubuntu or username/myapp)"
        required: true
        type: string
      tag:
        description: "Image tag"
        required: true
        default: "latest"
        type: string
      severity:
        description: "Minimum CVE severity that breaks the pipeline"
        required: true
        type: choice
        default: "HIGH,CRITICAL"
        options:
          - CRITICAL
          - HIGH,CRITICAL
          - MEDIUM,HIGH,CRITICAL

jobs:

  # ----------------------------------------------------------------------------
  # Job 1: Scan original image
  # continue-on-error on the JOB lets downstream jobs run and outputs pass
  # through even when the job fails. The job shows ❌ when CVEs are found.
  # Downstream jobs route on has_cves output — NOT on scan.result.
  # ----------------------------------------------------------------------------
  scan:
    name: CVE Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      has_cves: ${{ steps.has_cves.outputs.has_cves }}
    env:
      SOURCE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: podman pull "$SOURCE_IMAGE"

      - name: Scan
        id: scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ env.SOURCE_IMAGE }}
          tar_path: /tmp/source-image.tar
          artifact_name: trivy-results
          severity: ${{ inputs.severity }}

      - name: Set has_cves output
        id: has_cves
        if: always()
        run: |
          if [[ "${{ steps.scan.outcome }}" == "failure" ]]; then
            echo "has_cves=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cves=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail job when CVEs found
        if: always() && steps.has_cves.outputs.has_cves == 'true'
        run: exit 1

  # ----------------------------------------------------------------------------
  # Job 2: Publish original image (scan passed — no CVEs found)
  # ----------------------------------------------------------------------------
  publish_original:
    name: Publish to Registry (Original)
    runs-on: ubuntu-latest
    needs: scan
    if: needs.scan.outputs.has_cves == 'false'

    steps:
      - name: Pull image
        run: podman pull "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Get image size
        run: |
          bytes=$(podman image inspect \
            "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}" \
            --format '{{.Size}}' 2>/dev/null || echo 0)
          echo "ORIG_SIZE=$(awk -v b="$bytes" 'BEGIN{
            if(b>=1073741824) printf "%.1f GiB",b/1073741824
            else if(b>=1048576) printf "%.1f MiB",b/1048576
            else if(b>=1024) printf "%.1f KiB",b/1024
            else printf "%d B",b
          }')" >> "$GITHUB_ENV"

      - name: Login to registry
        run: |
          # podman login localhost:8083 \
          #   --username "${{ secrets.NEXUS_USER }}" \
          #   --password-stdin \
          #   --tls-verify=false
          echo "Simulated login: localhost:8083"

      - name: Tag image for registry
        run: |
          podman tag \
            "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}" \
            "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Push to registry
        run: |
          # podman push --tls-verify=false "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"
          echo "Simulated push: localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"

      - name: Job summary
        run: |
          {
            echo "## ✅ Pipeline Result: No CVEs Found — Image Approved"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}\` |"
            echo "| **Severity gate** | \`${{ inputs.severity }}\` |"
            echo "| **Result** | ✅ Passed — original image had no fixable CVEs |"
            echo "| **Patched** | No — published as-is |"
            echo "| **Image size** | ${ORIG_SIZE} |"
            echo ""
            echo "### Pull from registry"
            echo '```'
            echo "podman pull --tls-verify=false localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ----------------------------------------------------------------------------
  # Job 3: Patch image (scan found CVEs)
  # Detects the container OS via /etc/os-release, generates a Dockerfile
  # with FROM <source_image> + OS package update, and builds a patched image.
  # ----------------------------------------------------------------------------
  patch:
    name: Patch Image (OS & Language pkg Update)
    runs-on: ubuntu-latest
    needs: scan
    if: needs.scan.outputs.has_cves == 'true'
    env:
      SOURCE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}
      PATCHED_IMAGE: ${{ inputs.image_name }}:${{ inputs.tag }}-patched

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: podman pull "$SOURCE_IMAGE"

      - name: Build patched image
        run: bash patch-image.sh "$SOURCE_IMAGE" "$PATCHED_IMAGE"

      - name: Save patched image
        run: |
          podman image inspect "$SOURCE_IMAGE" --format '{{.Size}}' \
            2>/dev/null > /tmp/original-size.txt || echo 0 > /tmp/original-size.txt
          podman save "$PATCHED_IMAGE" -o /tmp/patched-image.tar

      - name: Upload patched image artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-image
          path: |
            /tmp/patched-image.tar
            /tmp/original-size.txt
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Job 4: Rescan the patched image
  # Same severity gate as the original scan.
  # Fails if CVEs remain after the OS update.
  # ----------------------------------------------------------------------------
  rescan:
    name: CVE Rescan (Patched)
    runs-on: ubuntu-latest
    needs: patch
    if: always() && needs.patch.result == 'success'
    env:
      PATCHED_IMAGE: ${{ inputs.image_name }}:${{ inputs.tag }}-patched

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download patched image artifact
        uses: actions/download-artifact@v4
        with:
          name: patched-image
          path: /tmp/

      - name: Scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ env.PATCHED_IMAGE }}
          tar_path: /tmp/patched-image.tar
          artifact_name: trivy-results-patched
          severity: ${{ inputs.severity }}
          skip_save: 'true'
          baseline_artifact: trivy-results-json

  # ----------------------------------------------------------------------------
  # Job 5: Publish patched image (rescan passed — CVEs fixed)
  # ----------------------------------------------------------------------------
  publish_patched:
    name: Publish to Registry (Patched)
    runs-on: ubuntu-latest
    needs: rescan
    if: always() && needs.rescan.result == 'success'

    steps:
      - name: Download patched image artifact
        uses: actions/download-artifact@v4
        with:
          name: patched-image
          path: /tmp/

      - name: Load patched image
        run: podman load -i /tmp/patched-image.tar

      - name: Get image sizes
        run: |
          fmt() {
            awk -v b="$1" 'BEGIN{
              if(b>=1073741824) printf "%.1f GiB",b/1073741824
              else if(b>=1048576) printf "%.1f MiB",b/1048576
              else if(b>=1024) printf "%.1f KiB",b/1024
              else printf "%d B",b
            }'
          }
          orig_bytes=$(cat /tmp/original-size.txt 2>/dev/null || echo 0)
          patch_bytes=$(podman image inspect \
            "${{ inputs.image_name }}:${{ inputs.tag }}-patched" \
            --format '{{.Size}}' 2>/dev/null || echo 0)
          echo "ORIG_SIZE=$(fmt "$orig_bytes")"   >> "$GITHUB_ENV"
          echo "PATCH_SIZE=$(fmt "$patch_bytes")" >> "$GITHUB_ENV"

      - name: Login to registry
        run: |
          # podman login localhost:8083 \
          #   --username "${{ secrets.NEXUS_USER }}" \
          #   --password-stdin \
          #   --tls-verify=false
          echo "Simulated login: localhost:8083"

      - name: Tag image for registry
        run: |
          podman tag \
            "${{ inputs.image_name }}:${{ inputs.tag }}-patched" \
            "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"

      - name: Push to registry
        run: |
          # podman push --tls-verify=false "localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"
          echo "Simulated push: localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"

      - name: Job summary
        run: |
          {
            echo "## ✅ Pipeline Result: CVEs Fixed — Image Approved"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.tag }}\` |"
            echo "| **Severity gate** | \`${{ inputs.severity }}\` |"
            echo "| **Result** | ✅ Patched — original image had CVEs, rescan passed after patching |"
            echo "| **Original image size** | ${ORIG_SIZE} |"
            echo "| **Patched image size** | ${PATCH_SIZE} |"
            echo "| **Published to** | \`localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched\` |"
            echo ""
            echo "> See **CVE Scan** job summary for the full vulnerability report."
            echo "> See **CVE Rescan (Patched)** job summary for fixed CVEs and remaining unfixable CVEs."
            echo ""
            echo "### Pull patched image"
            echo '```'
            echo "podman pull --tls-verify=false localhost:8083/${{ inputs.image_name }}:${{ inputs.tag }}-patched"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
