name: Trivy CVE Scan
description: Install Trivy, save a Podman image to tar, scan it, and upload the SARIF report.

inputs:
  image:
    description: "Image name to save and scan (e.g. docker.io/library/ubuntu:24.04)"
    required: true
  tar_path:
    description: "Absolute path for the saved tar file (e.g. /tmp/source-image.tar)"
    required: true
  artifact_name:
    description: "Name of the GitHub Actions artifact that receives the SARIF report"
    required: true
  severity:
    description: "Minimum CVE severity that causes the scan step to fail (e.g. HIGH,CRITICAL)"
    required: true
  skip_save:
    description: "Set to 'true' when tar_path already exists (downloaded as artifact) — skips podman save"
    required: false
    default: 'false'
  baseline_artifact:
    description: "Artifact name of the original scan JSON (enables Fixed CVEs section in the rescan summary)"
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        if ! command -v trivy &>/dev/null; then
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
        fi
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Save image for scanning
      if: inputs.skip_save != 'true'
      shell: bash
      run: |
        rm -f "${{ inputs.tar_path }}"
        podman save "${{ inputs.image }}" -o "${{ inputs.tar_path }}"

    - name: Scan for CVEs
      shell: bash
      run: |
        trivy image \
          --exit-code 1 \
          --severity "${{ inputs.severity }}" \
          --ignore-unfixed \
          --format table \
          --input "${{ inputs.tar_path }}" || TRIVY_RC=$?
        TRIVY_RC=${TRIVY_RC:-0}
        # Trivy v0.71+ exit code 5 = results exist but all filtered by
        # --ignore-unfixed (no fixable CVEs remain). Treat as success.
        if [[ $TRIVY_RC -eq 5 ]]; then exit 0; fi
        exit $TRIVY_RC

    - name: Scan summary (SARIF)
      if: always()
      shell: bash
      run: |
        trivy image \
          --exit-code 0 \
          --severity "${{ inputs.severity }}" \
          --ignore-unfixed \
          --format sarif \
          --output trivy-results.sarif \
          --input "${{ inputs.tar_path }}" || true

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: trivy-results.sarif

    - name: Download baseline scan JSON
      if: always() && inputs.baseline_artifact != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.baseline_artifact }}
        path: /tmp/baseline/

    - name: Job summary
      if: always()
      shell: bash
      run: |
        TRIVY_JSON="/tmp/trivy-scan.json"
        BASELINE_JSON="/tmp/baseline/trivy-scan.json"

        # Re-scan without --ignore-unfixed to capture ALL CVEs (fixable + not fixable).
        # DB is already cached from the scan step above — this is fast.
        # --scanners vuln: skip secret scanning, not needed for the summary.
        # stderr is kept visible so trivy failures appear in the step log.
        trivy image \
          --exit-code 0 \
          --scanners vuln \
          --severity "${{ inputs.severity }}" \
          --format json \
          --output "$TRIVY_JSON" \
          --input "${{ inputs.tar_path }}" || true

        if [[ ! -s "$TRIVY_JSON" ]]; then
          {
            echo "## Trivy Scan — \`${{ inputs.image }}\`"
            echo ""
            echo "Scan output not available — JSON scan failed."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        jq -r \
          --arg image "${{ inputs.image }}" \
          --arg severity "${{ inputs.severity }}" \
          '
            [.Results[] | .Vulnerabilities[]?] as $all |

            ($all | map(select(.FixedVersion != null and .FixedVersion != ""))) as $fixable |
            ($all | map(select(.FixedVersion == null or  .FixedVersion == ""))) as $unfixable |

            ($fixable   | length) as $n_fix   |
            ($unfixable | length) as $n_unfix  |

            ($fixable | map(select(.Severity == "CRITICAL")) | length) as $n_crit |
            ($fixable | map(select(.Severity == "HIGH"))     | length) as $n_high |
            ($fixable | map(select(.Severity == "MEDIUM"))   | length) as $n_med  |

            # ── Status header ────────────────────────────────────────────────
            "## Trivy Scan — `\($image)`",
            "",
            "| | |",
            "|---|---|",
            (if $n_fix == 0
             then "| **Status** | ✅ Passed |"
             else "| **Status** | ❌ Failed — \($n_fix) fixable CVE(s) |" end),
            "| **Severity gate** | `\($severity)` |",
            (if $n_crit > 0 then "| **CRITICAL** | \($n_crit) |" else empty end),
            (if $n_high > 0 then "| **HIGH**     | \($n_high) |" else empty end),
            (if $n_med  > 0 then "| **MEDIUM**   | \($n_med)  |" else empty end),
            "",

            # ── Fixable CVEs ─────────────────────────────────────────────────
            "### Fixable CVEs (\($n_fix))",
            "",
            if $n_fix > 0 then
              "| Package | CVE | Severity | Installed | Fixed |",
              "|---------|-----|----------|-----------|-------|",
              (
                $fixable |
                sort_by([
                  (if   .Severity == "CRITICAL" then 0
                   elif .Severity == "HIGH"     then 1
                   elif .Severity == "MEDIUM"   then 2
                   else 3 end),
                  .PkgName
                ]) |
                .[] |
                "| `\(.PkgName)` | [\(.VulnerabilityID)](https://avd.aquasec.com/nvd/\(.VulnerabilityID | ascii_downcase)) | \(.Severity) | \(.InstalledVersion) | \(.FixedVersion) |"
              )
            else
              "No fixable CVEs found at severity `\($severity)`."
            end,

            "",

            # ── Not Fixable CVEs ─────────────────────────────────────────────
            "### Not Fixable CVEs (\($n_unfix))",
            "",
            if $n_unfix > 0 then
              "| Package | CVE | Severity | Installed |",
              "|---------|-----|----------|-----------|",
              (
                $unfixable |
                sort_by([
                  (if   .Severity == "CRITICAL" then 0
                   elif .Severity == "HIGH"     then 1
                   elif .Severity == "MEDIUM"   then 2
                   else 3 end),
                  .PkgName
                ]) |
                .[] |
                "| `\(.PkgName)` | [\(.VulnerabilityID)](https://avd.aquasec.com/nvd/\(.VulnerabilityID | ascii_downcase)) | \(.Severity) | \(.InstalledVersion) |"
              )
            else
              "No CVEs without a fix found at severity `\($severity)`."
            end
          ' "$TRIVY_JSON" >> "$GITHUB_STEP_SUMMARY" || true

        # ── EPSS Risk Assessment ──────────────────────────────────────────────
        # The FIRST.org REST API now requires authentication.
        # Use the public daily EPSS CSV from epss.cyentia.com instead:
        # download → decompress → grep to only our CVEs → convert to JSON → join.
        EPSS_FILE="/tmp/epss-filtered.json"

        jq -r '[.Results[] | .Vulnerabilities[]? | .VulnerabilityID] | unique | .[]' \
          "$TRIVY_JSON" > /tmp/scan-cves.txt

        if [[ -s /tmp/scan-cves.txt ]]; then
          curl -sfL --max-time 60 "https://epss.cyentia.com/epss_scores-current.csv.gz" \
            | gunzip 2>/dev/null \
            | grep -Ff /tmp/scan-cves.txt \
            | awk -F',' \
                'BEGIN { printf "{\"data\":[" }
                 NR > 1 { printf "," }
                 { printf "{\"cve\":\"%s\",\"epss\":%s,\"percentile\":%s}", $1, $2, $3 }
                 END   { printf "]}" }' \
            > "$EPSS_FILE" || echo '{"data":[]}' > "$EPSS_FILE"
        else
          echo '{"data":[]}' > "$EPSS_FILE"
        fi

        jq -r \
          --slurpfile scan "$TRIVY_JSON" \
          '
            (.data // [] |
             map({key: .cve, value: {epss: .epss, percentile: .percentile}}) |
             from_entries) as $epss_idx |

            [$scan[0].Results[] | .Vulnerabilities[]?] as $all |

            ($all |
             map(. + {_epss: $epss_idx[.VulnerabilityID]}) |
             map(select(._epss != null)) |
             sort_by(-._epss.epss)) as $sorted |

            ($sorted | length) as $n_epss |

            "",
            "---",
            "",
            "### EPSS Risk Assessment",
            "",
            "> **What is EPSS?** The Exploit Prediction Scoring System (EPSS) estimates the probability",
            "> (0 to 1) that a CVE will be exploited in the wild within the next 30 days.",
            "> A score of `0.90` means a 90% chance of active exploitation.",
            "> The **Percentile** ranks the CVE against all scored CVEs — a 99th percentile means",
            "> only 1% of known CVEs carry a higher exploitation risk.",
            "> Use EPSS alongside severity to prioritize remediation: a MEDIUM-severity CVE with a",
            "> high EPSS score may be more urgent than a CRITICAL one with a near-zero score.",
            "",
            if $n_epss == 0 then
              "_No EPSS scores found for CVEs in this scan._"
            else
              "CVEs with EPSS data: **\($n_epss)**. Sorted by exploitation probability (highest first, top 20 shown).",
              "",
              "| CVE | Package | Severity | EPSS Score | Percentile |",
              "|-----|---------|----------|------------|------------|",
              (
                $sorted[:20] | .[] |
                "| [\(.VulnerabilityID)](https://avd.aquasec.com/nvd/\(.VulnerabilityID | ascii_downcase)) | `\(.PkgName)` | \(.Severity) | \(._epss.epss) | \(._epss.percentile * 100 | floor)th |"
              )
            end
          ' "$EPSS_FILE" >> "$GITHUB_STEP_SUMMARY" || true

        # ── Fixed CVEs (rescan only) ──────────────────────────────────────────
        if [[ -f "$BASELINE_JSON" ]]; then
          jq -r \
            --slurpfile current "$TRIVY_JSON" \
            '
              # CVE IDs still present in the patched image — build a lookup index
              ([$current[0].Results[] | .Vulnerabilities[]? | .VulnerabilityID] | INDEX(.)) as $cur_idx |

              # CVEs from the original scan that are no longer in the patched image
              [.Results[] | .Vulnerabilities[]? |
               select(.VulnerabilityID | in($cur_idx) | not)] as $fixed |

              ($fixed | map(select(.Severity == "CRITICAL")) | length) as $f_crit |
              ($fixed | map(select(.Severity == "HIGH"))     | length) as $f_high |
              ($fixed | map(select(.Severity == "MEDIUM"))   | length) as $f_med  |
              ($fixed | length) as $n_fixed |

              "",
              "### ✅ Fixed CVEs (\($n_fixed))",
              "",
              if $n_fixed > 0 then
                (if $f_crit > 0 then "> **CRITICAL fixed:** \($f_crit)" else empty end),
                (if $f_high > 0 then "> **HIGH fixed:** \($f_high)"     else empty end),
                (if $f_med  > 0 then "> **MEDIUM fixed:** \($f_med)"    else empty end),
                "",
                "| Package | CVE | Severity | Was Installed | Fix |",
                "|---------|-----|----------|---------------|-----|",
                (
                  $fixed |
                  sort_by([
                    (if   .Severity == "CRITICAL" then 0
                     elif .Severity == "HIGH"     then 1
                     elif .Severity == "MEDIUM"   then 2
                     else 3 end),
                    .PkgName
                  ]) |
                  .[] |
                  "| `\(.PkgName)` | [\(.VulnerabilityID)](https://avd.aquasec.com/nvd/\(.VulnerabilityID | ascii_downcase)) | \(.Severity) | \(.InstalledVersion) | \(.FixedVersion // "—") |"
                )
              else
                "No CVEs were resolved by the patch."
              end
            ' "$BASELINE_JSON" >> "$GITHUB_STEP_SUMMARY" || true
        fi

    - name: Upload scan JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}-json
        path: /tmp/trivy-scan.json
        retention-days: 1
