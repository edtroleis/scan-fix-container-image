name: Trivy CVE Scan
description: Install Trivy, save a Podman image to tar, scan it, and upload the SARIF report.

inputs:
  image:
    description: "Image name to save and scan (e.g. docker.io/library/ubuntu:24.04)"
    required: true
  tar_path:
    description: "Absolute path for the saved tar file (e.g. /tmp/source-image.tar)"
    required: true
  artifact_name:
    description: "Name of the GitHub Actions artifact that receives the SARIF report"
    required: true
  severity:
    description: "Minimum CVE severity that causes the scan step to fail (e.g. HIGH,CRITICAL)"
    required: true
  skip_save:
    description: "Set to 'true' when tar_path already exists (downloaded as artifact) — skips podman save"
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        mkdir -p "$HOME/.local/bin"
        if ! command -v trivy &>/dev/null; then
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
        fi
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Save image for scanning
      if: inputs.skip_save != 'true'
      shell: bash
      run: |
        rm -f "${{ inputs.tar_path }}"
        podman save "${{ inputs.image }}" -o "${{ inputs.tar_path }}"

    - name: Scan for CVEs
      shell: bash
      run: |
        trivy image \
          --exit-code 1 \
          --severity "${{ inputs.severity }}" \
          --ignore-unfixed \
          --format table \
          --input "${{ inputs.tar_path }}"

    - name: Scan summary (SARIF)
      if: always()
      shell: bash
      run: |
        trivy image \
          --exit-code 0 \
          --severity "${{ inputs.severity }}" \
          --ignore-unfixed \
          --format sarif \
          --output trivy-results.sarif \
          --input "${{ inputs.tar_path }}" || true

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: trivy-results.sarif

    - name: Job summary
      if: always()
      shell: bash
      run: |
        TRIVY_JSON="${{ inputs.tar_path }}.json"

        # Re-scan with JSON output — DB is already cached from the scan above.
        # --scanners vuln: skip secret scanning (not needed for the summary).
        trivy image \
          --exit-code 0 \
          --scanners vuln \
          --severity "${{ inputs.severity }}" \
          --ignore-unfixed \
          --format json \
          --output "$TRIVY_JSON" \
          --input "${{ inputs.tar_path }}" 2>/dev/null || true

        if [[ ! -s "$TRIVY_JSON" ]]; then
          echo "## Trivy Scan — \`${{ inputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Scan output not available." >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        jq -r \
          --arg image "${{ inputs.image }}" \
          --arg severity "${{ inputs.severity }}" \
          '
            [.Results[] | .Vulnerabilities[]? |
             select(.FixedVersion != null and .FixedVersion != "")] as $vulns |
            ($vulns | length) as $total |
            ($vulns | map(select(.Severity == "CRITICAL")) | length) as $n_crit |
            ($vulns | map(select(.Severity == "HIGH"))     | length) as $n_high |
            ($vulns | map(select(.Severity == "MEDIUM"))   | length) as $n_med  |

            "## Trivy Scan — `\($image)`",
            "",
            "| | |",
            "|---|---|",
            (if $total == 0
             then "| **Status** | ✅ Passed |"
             else "| **Status** | ❌ Failed — \($total) fixable CVE(s) |" end),
            "| **Severity gate** | `\($severity)` |",
            (if $n_crit > 0 then "| **CRITICAL** | \($n_crit) |" else empty end),
            (if $n_high > 0 then "| **HIGH**     | \($n_high) |" else empty end),
            (if $n_med  > 0 then "| **MEDIUM**   | \($n_med)  |" else empty end),
            "",
            if $total > 0 then
              "### Fixable CVEs",
              "",
              "| Package | CVE | Severity | Installed | Fixed |",
              "|---------|-----|----------|-----------|-------|",
              (
                $vulns |
                sort_by([
                  (if   .Severity == "CRITICAL" then 0
                   elif .Severity == "HIGH"     then 1
                   elif .Severity == "MEDIUM"   then 2
                   else 3 end),
                  .PkgName
                ]) |
                .[] |
                "| `\(.PkgName)` | [\(.VulnerabilityID)](https://avd.aquasec.com/nvd/\(.VulnerabilityID | ascii_downcase)) | \(.Severity) | \(.InstalledVersion) | \(.FixedVersion) |"
              )
            else
              "No fixable CVEs found at severity `\($severity)`."
            end
          ' "$TRIVY_JSON" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
